<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AutoReplication</title>
    <style>
      :root {
        --bg: #f0f4f8;
        --paper: rgba(255, 255, 255, 0.88);
        --paper-strong: #ffffff;
        --ink: #1a2332;
        --muted: #64748b;
        --line: rgba(148, 163, 184, 0.22);
        --accent: #3b82f6;
        --accent-soft: rgba(59, 130, 246, 0.08);
        --green: #22c55e;
        --amber: #f59e0b;
        --red: #ef4444;
        --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 8px 24px rgba(0,0,0,0.04);
        --shadow-lg: 0 4px 12px rgba(0,0,0,0.06), 0 20px 48px rgba(0,0,0,0.08);
        --radius: 12px;
        --radius-lg: 16px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: linear-gradient(135deg, #f0f4f8 0%, #e8edf5 100%);
        -webkit-font-smoothing: antialiased;
      }

      button, input, select, textarea { font: inherit; }

      .app-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto auto 1fr;
      }

      /* ── Top Bar ── */
      .topbar {
        padding: 20px 24px 16px;
        display: grid;
        gap: 16px;
      }

      .masthead {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: end;
      }

      .title {
        margin: 0;
        font-size: clamp(26px, 4vw, 38px);
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.01em;
        color: var(--ink);
      }

      .subtitle {
        margin-top: 6px;
        max-width: 620px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .status-strip {
        display: grid;
        grid-template-columns: repeat(5, minmax(120px, 1fr));
        gap: 10px;
      }

      .status-card, .surface {
        background: var(--paper);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        border-radius: var(--radius);
      }

      .status-card {
        padding: 12px 14px;
      }

      .status-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
      }

      .status-value {
        margin-top: 6px;
        font-size: 24px;
        font-weight: 700;
      }

      .status-meta {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.4;
      }

      /* ── Task Bar ── */
      .task-bar {
        margin: 0 24px;
        padding: 12px 14px;
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .task-bar label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
      }

      .task-bar .grow { flex: 1; }

      select, input, textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper-strong);
        color: var(--ink);
        padding: 10px 12px;
        font-size: 14px;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      select:focus, input:focus, textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      textarea {
        resize: vertical;
        min-height: 100px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 16px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        transition: background 0.15s ease, transform 0.1s ease;
      }

      button:active { transform: scale(0.97); }

      .primary-btn {
        background: var(--accent);
        color: white;
      }

      .primary-btn:hover { background: #2563eb; }

      .secondary-btn {
        background: transparent;
        color: var(--accent);
        border: 1px solid rgba(59, 130, 246, 0.25);
      }

      .secondary-btn:hover { background: var(--accent-soft); }

      /* ── Workspace / Board ── */
      .workspace {
        padding: 14px 24px 24px;
      }

      .board {
        display: grid;
        grid-template-columns: minmax(200px, 20%) minmax(480px, 50%) minmax(260px, 30%);
        gap: 14px;
        min-height: calc(100vh - 220px);
      }

      .panel-header {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .panel-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
      }

      .panel-body { padding: 14px; }

      .stack {
        display: grid;
        gap: 12px;
      }

      .empty-state {
        padding: 16px;
        border: 1px dashed rgba(148, 163, 184, 0.35);
        border-radius: var(--radius);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
        text-align: center;
      }

      /* ── Task Hero (canvas header) ── */
      .task-hero {
        padding: 16px 16px 12px;
        border-bottom: 1px solid var(--line);
      }

      .task-hero-title {
        margin: 0;
        font-size: clamp(20px, 2.5vw, 28px);
        font-weight: 700;
        line-height: 1.15;
      }

      .task-hero-meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .task-counts {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .chip {
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        font-size: 12px;
        font-weight: 500;
        color: var(--accent);
      }

      /* ── Timeline ── */
      .timeline {
        position: relative;
        display: grid;
        gap: 12px;
        padding-left: 20px;
      }

      .timeline::before {
        content: "";
        position: absolute;
        left: 7px;
        top: 6px;
        bottom: 6px;
        width: 2px;
        background: linear-gradient(180deg, var(--accent), rgba(148, 163, 184, 0.25));
        border-radius: 1px;
      }

      .stage-card {
        position: relative;
        background: var(--paper-strong);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
      }

      .stage-card::before {
        content: "";
        position: absolute;
        left: -18px;
        top: 16px;
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.35);
        border: 2px solid var(--paper-strong);
      }

      .stage-card.done::before { background: var(--green); }
      .stage-card.active::before { background: var(--accent); }
      .stage-card.pending::before { background: rgba(148, 163, 184, 0.35); }

      .stage-title { font-size: 14px; font-weight: 600; }

      .stage-meta, .stage-body {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      /* ── Canvas ── */
      .canvas-shell {
        position: relative;
        min-height: 520px;
        overflow: hidden;
        background:
          radial-gradient(circle, rgba(59, 130, 246, 0.03) 1px, transparent 1px),
          var(--paper-strong);
        background-size: 24px 24px;
      }

      .canvas-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .canvas-layer {
        position: absolute;
        inset: 0;
      }

      .agent-node {
        position: absolute;
        width: 140px;
        transform: translate(-50%, -50%);
        text-align: center;
        transition: left 0.3s ease, top 0.3s ease;
        z-index: 2;
      }

      .agent-node[data-dragging="true"] {
        transition: none;
        z-index: 10;
      }

      .agent-node button {
        width: 80px;
        height: 80px;
        border-radius: 999px;
        background: var(--paper-strong);
        border: 2px solid var(--line);
        box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        color: var(--ink);
        font-size: 12px;
        font-weight: 600;
        padding: 0 8px;
        position: relative;
        cursor: grab;
        transition: box-shadow 0.2s ease, border-color 0.2s ease;
      }

      .agent-node button:active { cursor: grabbing; }

      .agent-node button::after {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: 999px;
        border: 2.5px solid transparent;
        pointer-events: none;
      }

      .agent-node.working button::after {
        border-color: var(--green);
        animation: pulse 2s infinite;
      }

      .agent-node.idle button::after {
        border-color: rgba(59, 130, 246, 0.4);
      }

      .agent-node.fault button::after {
        border-color: var(--red);
      }

      @keyframes pulse {
        0% { opacity: 0.4; transform: scale(1); }
        70% { opacity: 0; transform: scale(1.15); }
        100% { opacity: 0; transform: scale(1.15); }
      }

      .agent-bubble {
        margin-top: 8px;
        border-radius: 10px;
        padding: 8px 10px;
        background: var(--paper);
        border: 1px solid var(--line);
        font-size: 11px;
        line-height: 1.4;
        color: var(--muted);
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        pointer-events: none;
      }

      /* ── Dispatch Card on Canvas ── */
      .dispatch-card {
        position: absolute;
        transform: translate(-50%, -50%);
        max-width: 170px;
        padding: 8px 10px;
        border-radius: 10px;
        background: var(--paper-strong);
        border: 1px solid rgba(59, 130, 246, 0.2);
        box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        cursor: pointer;
        z-index: 3;
        transition: box-shadow 0.15s ease;
      }

      .dispatch-card:hover {
        box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      }

      .dispatch-label {
        font-size: 12px;
        font-weight: 500;
        line-height: 1.35;
      }

      .dispatch-meta {
        margin-top: 3px;
        color: var(--muted);
        font-size: 11px;
      }

      /* ── Agent Strip (right column) ── */
      .agent-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .mini-agent {
        width: 48px;
        height: 48px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--paper-strong);
        display: grid;
        place-items: center;
        position: relative;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        transition: box-shadow 0.15s ease, transform 0.1s ease;
      }

      .mini-agent:hover {
        box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        transform: translateY(-1px);
      }

      .mini-agent span {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
      }

      .mini-agent::after {
        content: "";
        position: absolute;
        right: 1px;
        bottom: 1px;
        width: 11px;
        height: 11px;
        border-radius: 999px;
        border: 2px solid var(--paper-strong);
        background: rgba(148, 163, 184, 0.4);
      }

      .mini-agent.online-active::after { background: var(--green); }
      .mini-agent.online-idle::after { background: var(--accent); }
      .mini-agent.fault::after { background: var(--red); }

      /* ── Activity Feed ── */
      .activity-feed {
        display: grid;
        gap: 8px;
      }

      .activity-card {
        padding: 10px 12px;
        border-radius: 10px;
        background: var(--paper-strong);
        border: 1px solid var(--line);
        cursor: pointer;
        transition: box-shadow 0.15s ease, transform 0.1s ease;
        text-align: left;
        width: 100%;
      }

      .activity-card:hover {
        box-shadow: 0 4px 14px rgba(0,0,0,0.06);
        transform: translateY(-1px);
      }

      .activity-line {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .activity-line.spread {
        justify-content: space-between;
        flex-wrap: nowrap;
      }

      .activity-agent {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
      }

      .activity-route {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        flex-wrap: wrap;
      }

      .activity-avatar {
        width: 20px;
        height: 20px;
        border-radius: 999px;
        display: inline-grid;
        place-items: center;
        background: var(--accent-soft);
        border: 1px solid var(--line);
        font-size: 9px;
        font-weight: 700;
        color: var(--accent);
      }

      .activity-arrow {
        color: var(--muted);
        font-size: 13px;
      }

      .activity-title {
        font-size: 12px;
        line-height: 1.35;
        min-width: 0;
      }

      .activity-status {
        margin-left: auto;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid currentColor;
        color: var(--muted);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        white-space: nowrap;
      }

      .activity-line.spread .activity-status { margin-left: 10px; }

      .activity-status.good { color: var(--green); }
      .activity-status.warn { color: var(--amber); }
      .activity-status.bad { color: var(--red); }
      .activity-status.muted { color: var(--muted); }

      .activity-time {
        color: var(--muted);
        font-size: 11px;
        white-space: nowrap;
      }

      /* ── Drawer ── */
      .drawer-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.2);
        backdrop-filter: blur(2px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        z-index: 100;
      }

      .drawer-backdrop.open {
        opacity: 1;
        pointer-events: auto;
      }

      .drawer {
        position: fixed;
        top: 12px;
        right: 12px;
        bottom: 12px;
        width: min(460px, calc(100vw - 24px));
        background: var(--paper-strong);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        transform: translateX(calc(100% + 24px));
        transition: transform 0.2s ease;
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
        z-index: 101;
      }

      .drawer.open { transform: translateX(0); }

      .drawer-header, .modal-header {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .drawer-body, .modal-body {
        padding: 16px;
        overflow: auto;
        display: grid;
        gap: 12px;
      }

      .detail-block {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--paper);
        padding: 12px;
      }

      .detail-title {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 600;
      }

      .kv {
        display: grid;
        grid-template-columns: minmax(80px, 110px) 1fr;
        gap: 6px 10px;
        font-size: 13px;
      }

      .kv strong {
        color: var(--muted);
        font-weight: 500;
      }

      .mono {
        font-family: "SF Mono", "Fira Code", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(148, 163, 184, 0.06);
        padding: 8px;
        border-radius: 6px;
      }

      /* ── Modal ── */
      .modal-shell {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 16px;
        background: rgba(15, 23, 42, 0.25);
        backdrop-filter: blur(2px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        z-index: 200;
      }

      .modal-shell.open {
        opacity: 1;
        pointer-events: auto;
      }

      .modal {
        width: min(680px, 100%);
        max-height: calc(100vh - 32px);
        background: var(--paper-strong);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .form-grid {
        display: grid;
        gap: 12px;
      }

      .label {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 500;
      }

      .agent-checks {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 8px;
      }

      .agent-check {
        display: flex;
        align-items: start;
        gap: 8px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        transition: border-color 0.15s ease;
      }

      .agent-check:has(input:checked) {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .agent-check input { width: auto; margin-top: 2px; }

      .inline-actions {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .footnote {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      /* ── SVG connection animations ── */
      @keyframes dash-flow {
        to { stroke-dashoffset: -20; }
      }

      .conn-pending {
        stroke-dasharray: 6 4;
        animation: dash-flow 0.8s linear infinite;
      }

      /* ── Responsive ── */
      @media (max-width: 1260px) {
        .status-strip { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
        .board { grid-template-columns: 1fr; }
        .canvas-shell { min-height: 420px; }
      }

      @media (max-width: 720px) {
        .topbar, .workspace { padding-left: 12px; padding-right: 12px; }
        .task-bar { margin: 0 12px; flex-wrap: wrap; }
        .masthead { flex-direction: column; align-items: start; }
        .status-strip { grid-template-columns: 1fr; }
        .kv { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <section class="topbar">
        <div class="masthead">
          <div>
            <h1 class="title">AutoReplication</h1>
            <div class="subtitle">
              Task-centric control console for multi-agent research loops.
            </div>
          </div>
        </div>
        <div id="status-strip" class="status-strip"></div>
      </section>

      <section class="task-bar surface">
        <div class="grow">
          <label for="task-select">Task</label>
          <select id="task-select"></select>
        </div>
        <button id="new-task-button" class="primary-btn" type="button">New Task</button>
        <button id="refresh-button" class="secondary-btn" type="button">Refresh</button>
      </section>

      <section class="workspace">
        <div id="board" class="board"></div>
      </section>
    </div>

    <div id="drawer-backdrop" class="drawer-backdrop"></div>
    <aside id="detail-drawer" class="drawer" aria-hidden="true">
      <div class="drawer-header">
        <strong id="drawer-title">Detail</strong>
        <button id="close-drawer-button" class="secondary-btn" type="button">Close</button>
      </div>
      <div id="drawer-body" class="drawer-body"></div>
    </aside>

    <div id="task-modal-shell" class="modal-shell" aria-hidden="true">
      <div class="modal">
        <div class="modal-header">
          <strong>Create Task</strong>
          <button id="close-task-modal-button" class="secondary-btn" type="button">Close</button>
        </div>
        <div class="modal-body">
          <div class="form-grid">
            <label class="label">
              Title
              <input id="task-title" placeholder="Replicate a paper, trace a bug, or run a bounded experiment">
            </label>
            <label class="label">
              Entry Agent
              <select id="task-entry-agent"></select>
            </label>
            <label class="label">
              Objective
              <textarea id="task-objective" placeholder="Describe the main goal of the task."></textarea>
            </label>
            <label class="label">
              Initial Prompt
              <textarea id="task-initial-input" placeholder="Tell the entry agent how to begin this task."></textarea>
            </label>
            <label class="label">
              Operator Summary
              <textarea id="task-summary" placeholder="Short operator-facing summary for the task header."></textarea>
            </label>
            <div class="label">
              Participant Agents
              <div id="task-agent-checks" class="agent-checks"></div>
            </div>
            <div class="inline-actions">
              <button id="create-task-button" class="primary-btn" type="button">Create Task</button>
              <span id="task-form-status" class="footnote"></span>
            </div>
            <div class="footnote">
              Task creation is human-only. Dispatches are generated inside the system by agents, not manually from this screen.
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>

      /* ── App State ── */
      const state = {
        overview: null,
        agents: [],
        tasks: [],
        selectedTaskId: null,
        board: null,
        drawer: null,
        pollHandle: null,
        taskDraft: null,
        nodePositions: {},
        canvasDrag: null,
        prevAgentIds: null,
      };

      /* ── DOM Helpers ── */
      function patchHtml(container, newHtml) {
        const wrapper = document.createElement(container.tagName || "div");
        wrapper.innerHTML = newHtml;
        morphdom(container, wrapper, {
          childrenOnly: true,
          onBeforeElUpdated(fromEl, toEl) {
            if (fromEl === document.activeElement) return false;
            if (fromEl.dataset && fromEl.dataset.dragging === "true") return false;
            return true;
          },
        });
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatTime(value) {
        if (!value) return "unset";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toLocaleString([], {
          year: "numeric", month: "short", day: "numeric",
          hour: "2-digit", minute: "2-digit",
        });
      }

      function truncate(value, length = 96) {
        const text = String(value ?? "").trim();
        if (!text) return "";
        return text.length > length ? `${text.slice(0, length - 1)}…` : text;
      }

      function statusTone(status) {
        if (["running", "busy", "working", "active", "replied", "completed", "idle"].includes(status)) return "good";
        if (["pending", "accepted", "created", "launching"].includes(status)) return "warn";
        if (["failed", "fault", "offline", "error"].includes(status)) return "bad";
        return "muted";
      }

      function elapsedSince(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "unknown";
        const deltaMs = Date.now() - date.getTime();
        const minutes = Math.max(0, Math.floor(deltaMs / 60000));
        if (minutes < 1) return "< 1 min";
        if (minutes < 60) return `${minutes} min`;
        const hours = Math.floor(minutes / 60);
        const remain = minutes % 60;
        return `${hours}h ${remain}m`;
      }

      async function fetchJson(path, options) {
        const response = await fetch(path, options);
        if (!response.ok) {
          let message = `${response.status} ${response.statusText}`;
          try {
            const payload = await response.json();
            if (payload && payload.detail) message = String(payload.detail);
          } catch (e) {}
          throw new Error(message);
        }
        return response.json();
      }

      /* ── Node Position Persistence ── */
      function saveNodePositions() {
        if (state.selectedTaskId) {
          try {
            localStorage.setItem(
              `ar-canvas-${state.selectedTaskId}`,
              JSON.stringify(state.nodePositions)
            );
          } catch (e) {}
        }
      }

      function loadNodePositions() {
        state.nodePositions = {};
        if (state.selectedTaskId) {
          try {
            const saved = localStorage.getItem(`ar-canvas-${state.selectedTaskId}`);
            if (saved) state.nodePositions = JSON.parse(saved);
          } catch (e) {}
        }
      }

      /* ── Simple Force Layout ── */
      function computeForceLayout(agents, dispatches, width, height) {
        const pad = 80;
        const positions = {};

        // Initialize in circle
        agents.forEach((agent, i) => {
          const existing = state.nodePositions[agent.id];
          if (existing && existing.x > 0 && existing.y > 0) {
            positions[agent.id] = { ...existing };
          } else {
            const angle = (Math.PI * 2 * i) / agents.length - Math.PI / 2;
            const rx = Math.max(120, (width - pad * 2) / 2.8);
            const ry = Math.max(90, (height - pad * 2) / 3);
            positions[agent.id] = {
              x: width / 2 + Math.cos(angle) * rx,
              y: height / 2 + Math.sin(angle) * ry,
            };
          }
        });

        if (agents.length <= 1) return positions;

        // Build edge set
        const edges = dispatches
          .filter(d => positions[d.from_agent_id] && positions[d.to_agent_id])
          .map(d => [d.from_agent_id, d.to_agent_id]);

        // Run iterations
        const ids = agents.map(a => a.id);
        for (let iter = 0; iter < 40; iter++) {
          const forces = {};
          ids.forEach(id => { forces[id] = { fx: 0, fy: 0 }; });

          // Repulsion between all pairs
          for (let i = 0; i < ids.length; i++) {
            for (let j = i + 1; j < ids.length; j++) {
              const a = positions[ids[i]];
              const b = positions[ids[j]];
              let dx = a.x - b.x;
              let dy = a.y - b.y;
              let dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 1) { dx = 1; dy = 0; dist = 1; }
              const repulse = 18000 / (dist * dist);
              const fx = (dx / dist) * repulse;
              const fy = (dy / dist) * repulse;
              forces[ids[i]].fx += fx;
              forces[ids[i]].fy += fy;
              forces[ids[j]].fx -= fx;
              forces[ids[j]].fy -= fy;
            }
          }

          // Attraction along edges
          edges.forEach(([a, b]) => {
            const pa = positions[a];
            const pb = positions[b];
            const dx = pb.x - pa.x;
            const dy = pb.y - pa.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 1) return;
            const attract = dist * 0.008;
            const fx = (dx / dist) * attract;
            const fy = (dy / dist) * attract;
            forces[a].fx += fx;
            forces[a].fy += fy;
            forces[b].fx -= fx;
            forces[b].fy -= fy;
          });

          // Center gravity
          ids.forEach(id => {
            const p = positions[id];
            forces[id].fx += (width / 2 - p.x) * 0.002;
            forces[id].fy += (height / 2 - p.y) * 0.002;
          });

          // Apply with damping
          const damping = 0.3;
          ids.forEach(id => {
            const p = positions[id];
            p.x += forces[id].fx * damping;
            p.y += forces[id].fy * damping;
            p.x = Math.max(pad, Math.min(width - pad, p.x));
            p.y = Math.max(pad, Math.min(height - pad, p.y));
          });
        }

        return positions;
      }

      /* ── Render: Status Strip ── */
      function renderStatusStrip() {
        const container = document.getElementById("status-strip");
        const overview = state.overview;
        if (!overview) { patchHtml(container, ""); return; }
        const cards = [
          { label: "Gateway", value: overview.gateway.status.toUpperCase(), meta: `${overview.gateway.app} · port ${overview.gateway.port}` },
          { label: "Runtimes", value: overview.runtimes.total, meta: `${overview.runtimes.by_status.idle || 0} idle · ${overview.runtimes.by_status.busy || 0} busy` },
          { label: "Agents Working", value: overview.agents.working, meta: `${overview.agents.total} total agents` },
          { label: "Tasks Running", value: overview.tasks.running, meta: `${overview.tasks.total} total tasks` },
          { label: "Dispatches Waiting", value: overview.dispatches.waiting_reply, meta: `${overview.dispatches.total} total dispatches` },
        ];
        patchHtml(container, cards.map(c => `
          <div class="status-card" id="sc-${escapeHtml(c.label.replace(/\s+/g, '-').toLowerCase())}">
            <div class="status-label">${escapeHtml(c.label)}</div>
            <div class="status-value">${escapeHtml(c.value)}</div>
            <div class="status-meta">${escapeHtml(c.meta)}</div>
          </div>
        `).join(""));
      }

      /* ── Render: Task Select ── */
      function renderTaskSelect() {
        const select = document.getElementById("task-select");
        const tasks = state.tasks;
        if (!tasks.length) {
          patchHtml(select, `<option value="">No tasks yet</option>`);
          select.disabled = true;
          return;
        }
        select.disabled = false;
        patchHtml(select, tasks.map(t => `
          <option value="${escapeHtml(t.id)}" ${t.id === state.selectedTaskId ? "selected" : ""}>
            ${escapeHtml(t.title)}
          </option>
        `).join(""));
        select.value = state.selectedTaskId || tasks[0]?.id || "";
      }

      /* ── Classify Agent ── */
      function classifyAgent(agent, board) {
        const sessions = board.sessions.filter(s => s.agent_id === agent.id);
        const dispatches = board.dispatches.filter(d => d.from_agent_id === agent.id || d.to_agent_id === agent.id);
        if (agent.status === "failed" || sessions.some(s => s.status === "failed")) return "fault";
        if (sessions.some(s => ["created", "launching", "running"].includes(s.status))) return "working";
        if (dispatches.some(d => ["pending", "accepted", "running"].includes(d.status))) return "idle";
        return "idle";
      }

      function agentSummary(agent, board) {
        const sessions = board.sessions.filter(s => s.agent_id === agent.id);
        const active = sessions.find(s => ["running", "launching", "created"].includes(s.status));
        if (active?.summary) return truncate(active.summary, 80);
        if (agent.summary) return truncate(agent.summary, 80);
        const rd = board.dispatches.find(d =>
          (d.from_agent_id === agent.id || d.to_agent_id === agent.id) &&
          ["pending", "accepted", "running"].includes(d.status)
        );
        if (rd) return truncate(rd.payload.title || rd.payload.goal || rd.payload.question || rd.kind, 80);
        return "No active summary yet.";
      }

      function normalizeStagePlan(task) {
        const plan = task?.stage_plan;
        if (Array.isArray(plan?.stages)) return plan.stages;
        if (Array.isArray(plan)) return plan;
        return [];
      }

      /* ── Render: Timeline ── */
      function renderTimeline(stages) {
        if (!stages.length) {
          return `<div class="empty-state">No stage plan published for this task yet.</div>`;
        }
        return `<div class="timeline">${stages.map((s, i) => {
          const status = s.status || (i === 0 ? "active" : "pending");
          return `
            <article class="stage-card ${escapeHtml(status)}" id="stage-${i}">
              <div class="stage-title">${escapeHtml(s.title || `Stage ${i + 1}`)}</div>
              <div class="stage-meta">${escapeHtml((status).toUpperCase())}${s.updated_at ? ` · ${escapeHtml(formatTime(s.updated_at))}` : ""}</div>
              <div class="stage-body">${escapeHtml(s.summary || s.description || "No summary yet.")}</div>
            </article>
          `;
        }).join("")}</div>`;
      }

      /* ── Render: Canvas ── */
      function getCanvasSize() {
        const shell = document.querySelector(".canvas-shell");
        if (!shell) return { width: 760, height: 520 };
        return { width: shell.clientWidth || 760, height: shell.clientHeight || 520 };
      }

      function renderCanvas(board) {
        const agents = board.active_agents;
        if (!agents.length) {
          return `
            <div class="panel-body"><div class="empty-state">
              No active agents for this task yet.<br>Once dispatches or sessions start, the collaboration canvas will populate here.
            </div></div>
          `;
        }

        const { width: cw, height: ch } = getCanvasSize();
        const containerWidth = Math.max(600, cw);
        const containerHeight = Math.max(400, ch);

        // Determine if we need to recompute layout
        const currentIds = agents.map(a => a.id).sort().join(",");
        const needsLayout = state.prevAgentIds !== currentIds;
        if (needsLayout) {
          const positions = computeForceLayout(agents, board.dispatches, containerWidth, containerHeight);
          state.nodePositions = positions;
          state.prevAgentIds = currentIds;
          saveNodePositions();
        }

        // Ensure all agents have positions
        agents.forEach((agent, i) => {
          if (!state.nodePositions[agent.id]) {
            const angle = (Math.PI * 2 * i) / agents.length - Math.PI / 2;
            state.nodePositions[agent.id] = {
              x: containerWidth / 2 + Math.cos(angle) * 180,
              y: containerHeight / 2 + Math.sin(angle) * 130,
            };
          }
        });

        const activeDispatches = board.dispatches.filter(d => ["pending", "accepted", "running"].includes(d.status));

        // SVG arrow marker + connection lines
        const arrowDef = `<defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="rgba(100,116,139,0.5)"/></marker></defs>`;

        const lines = activeDispatches.map(d => {
          const from = state.nodePositions[d.from_agent_id];
          const to = state.nodePositions[d.to_agent_id];
          if (!from || !to) return "";
          const cx = (from.x + to.x) / 2;
          const cy = Math.min(from.y, to.y) - 50;
          const cls = d.status === "pending" ? "conn-pending" : "";
          return `<path data-from="${escapeHtml(d.from_agent_id)}" data-to="${escapeHtml(d.to_agent_id)}" d="M ${from.x} ${from.y} Q ${cx} ${cy} ${to.x} ${to.y}" fill="none" stroke="rgba(100,116,139,0.3)" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowhead)" class="${cls}"/>`;
        }).join("");

        const dispatchCards = activeDispatches.map(d => {
          const from = state.nodePositions[d.from_agent_id];
          const to = state.nodePositions[d.to_agent_id];
          if (!from || !to) return "";
          const left = (from.x + to.x) / 2;
          const top = (from.y + to.y) / 2 - 30;
          const startedAt = d.accepted_at || d.created_at;
          const runningFor = startedAt ? elapsedSince(startedAt) : "just now";
          const label = d.payload.title || d.payload.goal || d.payload.question || d.kind;
          return `
            <button class="dispatch-card" style="left:${left}px;top:${top}px;" data-dispatch-id="${escapeHtml(d.id)}" data-from="${escapeHtml(d.from_agent_id)}" data-to="${escapeHtml(d.to_agent_id)}" type="button">
              <div class="dispatch-label">${escapeHtml(truncate(label, 40))}</div>
              <div class="dispatch-meta">${escapeHtml(d.status)} · ${escapeHtml(runningFor)}</div>
            </button>
          `;
        }).join("");

        const nodes = agents.map(agent => {
          const pos = state.nodePositions[agent.id];
          const mode = classifyAgent(agent, board);
          return `
            <div class="agent-node ${escapeHtml(mode)}" id="anode-${escapeHtml(agent.id)}" style="left:${pos.x}px;top:${pos.y}px;">
              <button type="button" data-agent-id="${escapeHtml(agent.id)}">${escapeHtml(agent.name || agent.id)}</button>
              <div class="agent-bubble">${escapeHtml(agentSummary(agent, board))}</div>
            </div>
          `;
        }).join("");

        return `
          <div class="task-hero">
            <h2 class="task-hero-title">${escapeHtml(board.task.title)}</h2>
            <div class="task-hero-meta">${escapeHtml(board.task.summary || board.task.objective || "No operator summary yet.")}</div>
            <div class="task-counts">
              <span class="chip">${escapeHtml(board.counts.participant_agents)} participants</span>
              <span class="chip">${escapeHtml(board.counts.active_agents)} active</span>
              <span class="chip">${escapeHtml(board.counts.open_dispatches)} dispatches</span>
              <span class="chip">${escapeHtml(board.counts.running_sessions)} sessions</span>
            </div>
          </div>
          <div class="panel-body canvas-shell">
            <svg class="canvas-svg" viewBox="0 0 ${containerWidth} ${containerHeight}" preserveAspectRatio="xMidYMid meet">${arrowDef}${lines}</svg>
            <div class="canvas-layer">${nodes}${dispatchCards}</div>
          </div>
        `;
      }

      /* ── Render: Summary Rail ── */
      function renderSummaryRail(board) {
        const avatarText = v => String(v || "?").slice(0, 2).toUpperCase();
        const participants = board.participant_agents.map(agent => {
          const mode = classifyAgent(agent, board);
          const cls = mode === "working" ? "online-active" : mode === "fault" ? "fault" : "online-idle";
          return `
            <button class="mini-agent ${cls}" type="button" data-agent-id="${escapeHtml(agent.id)}" title="${escapeHtml(agent.name || agent.id)}">
              <span>${escapeHtml((agent.name || agent.id).slice(0, 2).toUpperCase())}</span>
            </button>
          `;
        }).join("");

        const activityItems = board.activity.filter(i => i.kind === "dispatch" || i.kind === "system");
        const feed = activityItems.length ? activityItems.map(item => {
          if (item.kind === "dispatch") {
            const tone = statusTone(item.status);
            return `
              <button class="activity-card" type="button" data-dispatch-id="${escapeHtml(item.dispatch_id)}">
                <div class="activity-line spread">
                  <span class="activity-route">
                    <span class="activity-agent">
                      <span class="activity-avatar">${escapeHtml(avatarText(item.from_agent_id))}</span>
                      <span>${escapeHtml(item.from_agent_id)}</span>
                    </span>
                    <span class="activity-arrow">&rarr;</span>
                    <span class="activity-agent">
                      <span class="activity-avatar">${escapeHtml(avatarText(item.to_agent_id))}</span>
                      <span>${escapeHtml(item.to_agent_id)}</span>
                    </span>
                  </span>
                  <span class="activity-time">${escapeHtml(formatTime(item.created_at))}</span>
                </div>
                <div class="activity-line spread">
                  <span class="activity-title">${escapeHtml(truncate(item.title, 40))}</span>
                  <span class="activity-status ${escapeHtml(tone)}">${escapeHtml(item.status)}</span>
                </div>
              </button>
            `;
          }
          const message = item.message || "System Activity";
          return `
            <button class="activity-card" type="button" ${item.agent_id ? `data-agent-id="${escapeHtml(item.agent_id)}"` : ""}>
              <div class="activity-line spread">
                <span class="activity-agent">
                  <span class="activity-avatar">${escapeHtml(avatarText(item.agent_id))}</span>
                  <span>${escapeHtml(item.agent_id)}: ${escapeHtml(message)}</span>
                </span>
                <span class="activity-time">${escapeHtml(formatTime(item.created_at))}</span>
              </div>
            </button>
          `;
        }).join("") : `<div class="empty-state">No task activity yet.</div>`;

        return `
          <section class="surface">
            <div class="panel-header"><div class="panel-title">Task Agents</div></div>
            <div class="panel-body">
              ${participants ? `<div class="agent-strip">${participants}</div>` : `<div class="empty-state">No participant agents yet.</div>`}
            </div>
          </section>
          <section class="surface">
            <div class="panel-header"><div class="panel-title">Activity Summary</div></div>
            <div class="panel-body">
              <div class="activity-feed">${feed}</div>
            </div>
          </section>
        `;
      }

      /* ── Render: Board ── */
      function renderBoard() {
        const container = document.getElementById("board");
        if (!state.selectedTaskId) {
          patchHtml(container, `<section class="surface"><div class="panel-body"><div class="empty-state">Create a task to start the control loop.</div></div></section>`);
          return;
        }
        if (!state.board) {
          patchHtml(container, `<section class="surface"><div class="panel-body"><div class="empty-state">Loading task board...</div></div></section>`);
          return;
        }

        const stages = normalizeStagePlan(state.board.task);
        patchHtml(container, `
          <section class="surface" id="timeline-panel">
            <div class="panel-header"><div class="panel-title">Stage Timeline</div></div>
            <div class="panel-body">${renderTimeline(stages)}</div>
          </section>
          <section class="surface" id="canvas-panel">
            ${renderCanvas(state.board)}
          </section>
          <section class="stack" id="summary-panel">
            ${renderSummaryRail(state.board)}
          </section>
        `);
      }

      /* ── Canvas Drag ── */
      function initCanvasDrag() {
        const board = document.getElementById("board");
        if (!board) return;

        board.addEventListener("pointerdown", (e) => {
          const nodeBtn = e.target.closest(".agent-node button[data-agent-id]");
          if (!nodeBtn) return;
          const agentId = nodeBtn.dataset.agentId;
          const pos = state.nodePositions[agentId];
          if (!pos) return;

          e.preventDefault();
          const node = nodeBtn.closest(".agent-node");
          node.dataset.dragging = "true";

          const shell = document.querySelector(".canvas-shell");
          const rect = shell.getBoundingClientRect();

          state.canvasDrag = {
            agentId,
            offsetX: e.clientX - (rect.left + pos.x),
            offsetY: e.clientY - (rect.top + pos.y),
            shellRect: rect,
          };

          nodeBtn.setPointerCapture(e.pointerId);
        });

        board.addEventListener("pointermove", (e) => {
          if (!state.canvasDrag) return;
          const { agentId, offsetX, offsetY, shellRect } = state.canvasDrag;
          const newX = e.clientX - shellRect.left - offsetX;
          const newY = e.clientY - shellRect.top - offsetY;
          state.nodePositions[agentId] = { x: newX, y: newY };

          // Direct DOM update for smoothness
          const node = document.getElementById(`anode-${agentId}`);
          if (node) {
            node.style.left = `${newX}px`;
            node.style.top = `${newY}px`;
          }
          updateConnections();
        });

        board.addEventListener("pointerup", (e) => {
          if (!state.canvasDrag) return;
          const node = document.getElementById(`anode-${state.canvasDrag.agentId}`);
          if (node) node.dataset.dragging = "false";
          state.canvasDrag = null;
          saveNodePositions();
        });
      }

      function updateConnections() {
        const svg = document.querySelector(".canvas-svg");
        if (!svg) return;
        svg.querySelectorAll("path[data-from][data-to]").forEach(path => {
          const from = state.nodePositions[path.dataset.from];
          const to = state.nodePositions[path.dataset.to];
          if (!from || !to) return;
          const cx = (from.x + to.x) / 2;
          const cy = Math.min(from.y, to.y) - 50;
          path.setAttribute("d", `M ${from.x} ${from.y} Q ${cx} ${cy} ${to.x} ${to.y}`);
        });
        document.querySelectorAll(".dispatch-card[data-from][data-to]").forEach(card => {
          const from = state.nodePositions[card.dataset.from];
          const to = state.nodePositions[card.dataset.to];
          if (!from || !to) return;
          card.style.left = `${(from.x + to.x) / 2}px`;
          card.style.top = `${(from.y + to.y) / 2 - 30}px`;
        });
      }

      /* ── Task Modal ── */
      function captureTaskDraft() {
        const shell = document.getElementById("task-modal-shell");
        if (!shell.classList.contains("open")) return state.taskDraft;
        const checks = [...document.querySelectorAll("#task-agent-checks input:checked")];
        state.taskDraft = {
          title: document.getElementById("task-title").value,
          entryAgentId: document.getElementById("task-entry-agent").value,
          objective: document.getElementById("task-objective").value,
          initialInput: document.getElementById("task-initial-input").value,
          summary: document.getElementById("task-summary").value,
          participantAgentIds: checks.map(i => i.value),
          statusText: document.getElementById("task-form-status").textContent || "",
        };
        return state.taskDraft;
      }

      function populateTaskModal() {
        const entrySelect = document.getElementById("task-entry-agent");
        const checksContainer = document.getElementById("task-agent-checks");
        const agents = state.agents;
        const draft = state.taskDraft || {};
        patchHtml(entrySelect, agents.map(a => `
          <option value="${escapeHtml(a.id)}">${escapeHtml(a.name || a.id)} · ${escapeHtml(a.id)}</option>
        `).join(""));
        patchHtml(checksContainer, agents.map(a => `
          <label class="agent-check">
            <input type="checkbox" value="${escapeHtml(a.id)}" ${draft.participantAgentIds?.includes(a.id) ? "checked" : ""}>
            <span>
              <strong>${escapeHtml(a.name || a.id)}</strong><br>
              <span class="footnote">${escapeHtml(a.id)}${a.runtime_id ? ` · ${escapeHtml(a.runtime_id)}` : ""}</span>
            </span>
          </label>
        `).join(""));
        const fallback = draft.entryAgentId || agents[0]?.id || "";
        entrySelect.value = agents.some(a => a.id === fallback) ? fallback : (agents[0]?.id || "");
        document.getElementById("task-title").value = draft.title || "";
        document.getElementById("task-objective").value = draft.objective || "";
        document.getElementById("task-initial-input").value = draft.initialInput || "";
        document.getElementById("task-summary").value = draft.summary || "";
        document.getElementById("task-form-status").textContent = draft.statusText || "";
      }

      function openTaskModal() {
        if (!state.taskDraft) {
          state.taskDraft = {
            title: "", entryAgentId: state.agents[0]?.id || "",
            objective: "", initialInput: "", summary: "",
            participantAgentIds: [], statusText: "",
          };
        }
        populateTaskModal();
        document.getElementById("task-modal-shell").classList.add("open");
      }

      function closeTaskModal() {
        document.getElementById("task-modal-shell").classList.remove("open");
        state.taskDraft = null;
      }

      /* ── Drawer ── */
      function openDrawer(title, html) {
        document.getElementById("drawer-title").textContent = title;
        patchHtml(document.getElementById("drawer-body"), html);
        document.getElementById("drawer-backdrop").classList.add("open");
        document.getElementById("detail-drawer").classList.add("open");
      }

      function closeDrawer() {
        document.getElementById("drawer-backdrop").classList.remove("open");
        document.getElementById("detail-drawer").classList.remove("open");
      }

      function renderAgentDetail(agentId) {
        const board = state.board;
        const agent = board?.participant_agents.find(a => a.id === agentId) || state.agents.find(a => a.id === agentId);
        if (!agent) return;
        const sessions = (board?.sessions || []).filter(s => s.agent_id === agentId);
        const dispatches = (board?.dispatches || []).filter(d => d.from_agent_id === agentId || d.to_agent_id === agentId);
        openDrawer(agent.name || agent.id, `
          <div class="detail-block">
            <h3 class="detail-title">Agent</h3>
            <div class="kv">
              <strong>ID</strong><span>${escapeHtml(agent.id)}</span>
              <strong>Status</strong><span>${escapeHtml(agent.status || "idle")}</span>
              <strong>Runtime</strong><span>${escapeHtml(agent.runtime_id || "unassigned")}</span>
              <strong>Role</strong><span>${escapeHtml(agent.role || "unset")}</span>
            </div>
          </div>
          <div class="detail-block">
            <h3 class="detail-title">Current Task Scope</h3>
            <div class="kv">
              <strong>Sessions</strong><span>${escapeHtml(sessions.length)}</span>
              <strong>Dispatches</strong><span>${escapeHtml(dispatches.length)}</span>
            </div>
          </div>
          <div class="detail-block">
            <h3 class="detail-title">Latest Summary</h3>
            <div>${escapeHtml(agent.summary || agentSummary(agent, board || { sessions: [], dispatches: [] }))}</div>
          </div>
        `);
      }

      function renderDispatchDetail(dispatchId) {
        const dispatch = state.board?.dispatches.find(d => d.id === dispatchId);
        if (!dispatch) return;
        openDrawer(dispatch.payload.title || dispatch.kind, `
          <div class="detail-block">
            <h3 class="detail-title">Dispatch</h3>
            <div class="kv">
              <strong>ID</strong><span>${escapeHtml(dispatch.id)}</span>
              <strong>Kind</strong><span>${escapeHtml(dispatch.kind)}</span>
              <strong>Status</strong><span>${escapeHtml(dispatch.status)}</span>
              <strong>From</strong><span>${escapeHtml(dispatch.from_agent_id)}</span>
              <strong>To</strong><span>${escapeHtml(dispatch.to_agent_id)}</span>
              <strong>Created</strong><span>${escapeHtml(formatTime(dispatch.created_at))}</span>
              <strong>Resolved</strong><span>${escapeHtml(formatTime(dispatch.resolved_at))}</span>
            </div>
          </div>
          <div class="detail-block">
            <h3 class="detail-title">Payload</h3>
            <div class="mono">${escapeHtml(JSON.stringify(dispatch.payload, null, 2))}</div>
          </div>
          <div class="detail-block">
            <h3 class="detail-title">Reply</h3>
            <div class="mono">${escapeHtml(dispatch.reply ? JSON.stringify(dispatch.reply, null, 2) : "No reply yet.")}</div>
          </div>
        `);
      }

      function renderSessionDetail(sessionId) {
        const session = state.board?.sessions.find(s => s.id === sessionId);
        if (!session) return;
        openDrawer(session.title, `
          <div class="detail-block">
            <h3 class="detail-title">Session</h3>
            <div class="kv">
              <strong>ID</strong><span>${escapeHtml(session.id)}</span>
              <strong>Agent</strong><span>${escapeHtml(session.agent_id)}</span>
              <strong>Status</strong><span>${escapeHtml(session.status)}</span>
              <strong>Dispatch</strong><span>${escapeHtml(session.dispatch_id || "unset")}</span>
              <strong>Preset</strong><span>${escapeHtml(session.preset_id || "unset")}</span>
              <strong>Model</strong><span>${escapeHtml(session.model || "unset")}</span>
            </div>
          </div>
          <div class="detail-block">
            <h3 class="detail-title">Summary</h3>
            <div>${escapeHtml(session.summary || "No session summary yet.")}</div>
          </div>
          <div class="detail-block">
            <h3 class="detail-title">Steering</h3>
            <div class="footnote">Session-level steering entry point will be wired in the next UI step.</div>
          </div>
        `);
      }

      /* ── Data Loading ── */
      async function loadTasksAndAgents() {
        const [tasks, agents] = await Promise.all([
          fetchJson("/api/tasks"),
          fetchJson("/api/agents"),
        ]);
        state.tasks = tasks;
        state.agents = agents;
        if (!state.selectedTaskId && tasks.length) state.selectedTaskId = tasks[0].id;
        if (state.selectedTaskId && !tasks.some(t => t.id === state.selectedTaskId)) {
          state.selectedTaskId = tasks[0]?.id || null;
        }
      }

      async function loadOverview() {
        state.overview = await fetchJson("/api/overview");
      }

      async function loadBoard() {
        if (!state.selectedTaskId) { state.board = null; return; }
        state.board = await fetchJson(`/api/tasks/${encodeURIComponent(state.selectedTaskId)}/board`);
      }

      async function refreshAll() {
        captureTaskDraft();
        await Promise.all([loadOverview(), loadTasksAndAgents()]);
        loadNodePositions();
        await loadBoard();
        renderStatusStrip();
        renderTaskSelect();
        renderBoard();
        populateTaskModal();
      }

      async function createTask() {
        const title = document.getElementById("task-title").value.trim();
        const entryAgentId = document.getElementById("task-entry-agent").value;
        const objective = document.getElementById("task-objective").value.trim();
        const initialInput = document.getElementById("task-initial-input").value.trim();
        const summary = document.getElementById("task-summary").value.trim();
        const checks = [...document.querySelectorAll("#task-agent-checks input:checked")];
        const participantAgentIds = checks.map(i => i.value);
        const status = document.getElementById("task-form-status");

        if (!title || !entryAgentId || !initialInput) {
          status.textContent = "Title, entry agent, and initial prompt are required.";
          return;
        }

        status.textContent = "Creating...";
        captureTaskDraft();
        try {
          const task = await fetchJson("/api/tasks", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              title,
              created_by: "human",
              entry_agent_id: entryAgentId,
              participant_agent_ids: participantAgentIds,
              objective: objective || initialInput,
              initial_input: initialInput,
              summary: summary || null,
              stage_plan: {
                stages: [{
                  title: "Task created",
                  status: "active",
                  summary: "Initial task shell created by operator.",
                  updated_at: new Date().toISOString(),
                }],
              },
            }),
          });
          state.selectedTaskId = task.id;
          status.textContent = "Task created.";
          closeTaskModal();
          await refreshAll();
        } catch (error) {
          status.textContent = error.message;
        }
      }

      /* ── Event Handlers ── */
      function handleBoardClick(event) {
        if (state.canvasDrag) return;
        const agentBtn = event.target.closest("[data-agent-id]");
        if (agentBtn) { renderAgentDetail(agentBtn.dataset.agentId); return; }
        const dispatchBtn = event.target.closest("[data-dispatch-id]");
        if (dispatchBtn) { renderDispatchDetail(dispatchBtn.dataset.dispatchId); return; }
        const sessionBtn = event.target.closest("[data-session-id]");
        if (sessionBtn) { renderSessionDetail(sessionBtn.dataset.sessionId); }
      }

      function bindEvents() {
        document.getElementById("task-select").addEventListener("change", async (e) => {
          state.selectedTaskId = e.target.value || null;
          state.prevAgentIds = null;
          loadNodePositions();
          await loadBoard();
          renderBoard();
        });
        document.getElementById("new-task-button").addEventListener("click", openTaskModal);
        document.getElementById("close-task-modal-button").addEventListener("click", closeTaskModal);
        document.getElementById("task-modal-shell").addEventListener("click", (e) => {
          if (e.target.id === "task-modal-shell") closeTaskModal();
        });
        document.getElementById("create-task-button").addEventListener("click", createTask);
        document.getElementById("refresh-button").addEventListener("click", refreshAll);
        document.getElementById("board").addEventListener("click", handleBoardClick);
        document.getElementById("drawer-backdrop").addEventListener("click", closeDrawer);
        document.getElementById("close-drawer-button").addEventListener("click", closeDrawer);
        initCanvasDrag();
      }

      /* ── Boot ── */
      async function boot() {
        bindEvents();
        await refreshAll();
        state.pollHandle = window.setInterval(async () => {
          try { await refreshAll(); } catch (e) {}
        }, 5000);
      }

      boot().catch((error) => {
        document.getElementById("board").innerHTML = `
          <section class="surface"><div class="panel-body">
            <div class="empty-state">Failed to load UI: ${escapeHtml(error.message)}</div>
          </div></section>
        `;
      });
    </script>
  </body>
</html>
